appId: com.kienzle.fat
productName: KienzleFAT
copyright: Copyright © 2026 Kienzle Sh.P.K.

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

extraResources:
  - from: resources/
    to: resources/

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KienzleFAT

mac:
  target: dmg

linux:
  target: AppImage
